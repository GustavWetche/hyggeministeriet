<!DOCTYPE HTML>
<html>
	<head>
		<title>hyggeministeriet — hygger?</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background-color: #ffffff;
				width: 100vw;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				font-family: Georgia, serif;
			}

			.container {
				text-align: center;
				max-width: 500px;
				padding: 2rem;
			}

			h2 {
				font-size: 1.2rem;
				font-weight: normal;
				letter-spacing: 0.05em;
				margin-bottom: 2rem;
				color: #000;
			}

			.svar {
				display: flex;
				gap: 1rem;
				justify-content: center;
			}

			.svar button {
				background-color: #000;
				color: #fff;
				border: none;
				padding: 12px 28px;
				font-family: Georgia, serif;
				font-size: 0.9rem;
				letter-spacing: 0.08em;
				cursor: pointer;
				transition: background-color 0.2s ease, transform 0.2s ease;
			}

			.svar button:hover {
				background-color: #333;
				transform: scale(1.05);
			}

			.besked {
				font-size: 1rem;
				letter-spacing: 0.05em;
				color: #000;
				font-style: italic;
				opacity: 0;
				transition: opacity 1.2s ease-in-out;
				min-height: 2rem;
			}

			.sektion {
				display: none;
			}

			.sektion.aktiv {
				display: block;
			}
		</style>
	</head>
	<body>
		<div class="container">

			<!-- Spørgsmål 1 -->
			<div id="s1" class="sektion aktiv">
				<h2>Hvilket køn er du?</h2>
				<div class="svar">
					<button onclick="svar1()">Mand</button>
					<button onclick="svar1()">Kvinde</button>
				</div>
			</div>

			<!-- Svar på spørgsmål 1 -->
			<div id="s1-svar" class="sektion">
				<p class="besked" id="s1-tekst1">det er faktisk lige meget, hvis man er en ægte hygger.</p>
				<p class="besked" id="s1-tekst2">... men det er en ærlig fejl.</p>
				<p class="besked" id="s1-tekst3">Nu videre til næste spørgsmål.</p>
			</div>

			<!-- Spørgsmål 2 -->
			<div id="s2" class="sektion">
				<h2>Har du hyggelyde?</h2>
				<div class="svar">
					<button onclick="svar2ja()">Ja</button>
					<button onclick="svar2nej()">Nej</button>
				</div>
			</div>

			<!-- Svar nej på spørgsmål 2 -->
			<div id="s2-nej" class="sektion">
				<p class="besked" id="s2-nej-tekst">du er ikke egnet til at blive en hygger.</p>
				<div class="svar" id="s2-nej-knap" style="margin-top: 2rem; opacity: 0; transition: opacity 1.2s ease-in-out;">
					<button onclick="window.location.href='index.html'">Prøv at bevis dit værd igen</button>
				</div>
			</div>

			<!-- Spørgsmål 3 -->
			<div id="s3" class="sektion">
				<h2>Er de high pitched?</h2>
				<div class="svar">
					<button onclick="alert('coming soon...')">Ja</button>
					<button onclick="alert('coming soon...')">Nej</button>
				</div>
			</div>

		</div>

		<script>
			function vis(id) {
				document.querySelectorAll(".sektion").forEach(el => el.classList.remove("aktiv"));
				document.getElementById(id).classList.add("aktiv");
			}

			function fadeIn(el, callback) {
				el.style.opacity = "0";
				setTimeout(() => {
					el.style.opacity = "1";
					setTimeout(() => {
						if (callback) {
							el.style.opacity = "0";
							setTimeout(callback, 1200);
						}
					}, 2500);
				}, 100);
			}

			function svar1() {
				vis("s1-svar");
				const t1 = document.getElementById("s1-tekst1");
				const t2 = document.getElementById("s1-tekst2");
				const t3 = document.getElementById("s1-tekst3");

				fadeIn(t1, () => {
					fadeIn(t2, () => {
						t3.style.opacity = "1";
						setTimeout(() => {
							t3.style.opacity = "0";
							setTimeout(() => vis("s2"), 1200);
						}, 2000);
					});
				});
			}

			function svar2nej() {
				vis("s2-nej");
				const el = document.getElementById("s2-nej-tekst");
				const knap = document.getElementById("s2-nej-knap");
				setTimeout(() => {
					el.style.opacity = "1";
					setTimeout(() => knap.style.opacity = "1", 1500);
				}, 100);
			}

			function svar2ja() {
				vis("s3");
			}
		</script>
	</body>
</html>
