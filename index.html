<!DOCTYPE HTML>
<html>
	<head>
		<title>hyggeministeriet</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background-color: #ffffff;
				width: 100vw;
				height: 100vh;
				overflow: hidden;
				position: relative;
			}

			.word {
				position: absolute;
				color: #000000;
				font-family: Georgia, serif;
				font-size: 1rem;
				font-weight: normal;
				letter-spacing: 0.1em;
				white-space: nowrap;
				opacity: 0;
				transition: opacity 1.5s ease-in-out;
			}
		</style>
	</head>
	<body>
		<span class="word" id="word">hyggeministeriet</span>

		<script>
			const el = document.getElementById("word");
			const margin = 5;
			const positions = [];

			// Forudberegn 32 tilfældige positioner
			for (let i = 0; i < 32; i++) {
				positions.push({
					top: margin + Math.random() * (100 - margin * 2),
					left: margin + Math.random() * (100 - margin * 2)
				});
			}

			let index = 0;

			function showNext() {
				const pos = positions[index % positions.length];
				index++;

				// Flyt til ny position mens den er usynlig
				el.style.top = pos.top + "%";
				el.style.left = pos.left + "%";

				// Fade ind
				el.style.opacity = "1";

				// Fade ud efter 2 sekunder
				setTimeout(() => {
					el.style.opacity = "0";
					// Vent på fade ud er færdig, vis næste
					setTimeout(showNext, 1500);
				}, 2000);
			}

			showNext();
		</script>
	</body>
</html>
