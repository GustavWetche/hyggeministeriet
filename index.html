<!DOCTYPE HTML>
<html>
	<head>
		<title>hyggeministeriet</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background-color: #ffffff;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
			}

			h6 {
				color: #000000;
				font-family: Georgia, serif;
				font-size: 1rem;
				font-weight: normal;
				letter-spacing: 0.1em;
				animation: pulse 3s ease-in-out infinite;
			}

			@keyframes pulse {
				0%   { opacity: 1; }
				50%  { opacity: 0.2; }
				100% { opacity: 1; }
			}
		</style>
	</head>
	<body>
		<h6>hyggeministeriet</h6>
	</body>
</html>
